display_information:
  name: Growth Ops Copilot
  description: Bot de inteligência operacional do time de Growth CRM
  background_color: "#21C25E"
  long_description: |
    Bot que centraliza consultas de campanhas, métricas de performance, 
    status operacional e testes LIFT. Integra Monday.com + Databricks 
    para respostas em tempo real sobre campanhas de CRM.

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Growth Ops
    always_online: true
  slash_commands:
    - command: /growth
      description: Consultar campanhas, métricas e status
      usage_hint: "[status|lift|debug|daily] [nome ou ID]"
      should_escape: false
    - command: /campaign
      description: Sugestões de campanha e planejamento
      usage_hint: "[objetivo] [produto] [prazo]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - chat:write.public
      - commands
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
